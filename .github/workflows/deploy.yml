name: Новое эссе

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-build"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 🔥 ДОБАВЛЕНО: Установка Node.js зависимостей
      - name: Install Node dependencies
        run: npm install

      - name: Create logs directory
        run: mkdir -p logs

      - name: Генерация новой записи журнала
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node src/core/entryGenerator.js || echo "entryGenerator завершился с ошибкой → продолжаем"

      - name: Литературный анализ (критик)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "🖋️ Запуск критика..."
          node src/core/literaryAnalyzer.js || echo "Анализ критика упал → сохраняем что есть"

      - name: Commit and push updated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add data/journal.json
          git add data/literary_analysis.json
          git add data/tag_statistics.json
          git add src/config/context.json
          git add logs/ --force || true
          
          if git diff --cached --quiet; then
            echo "ℹ️ Нет изменений для коммита."
            exit 0
          fi
          
          git pull --rebase || true
          git commit -m "📝 Автоматическое обновление журнала и анализа" || exit 0
          git push --force-with-lease || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
