name: Generate Image (Grok Imagine)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Промпт для генерации изображения (на английском для лучшего результата)'
        required: false
        default: 'A cute dog in a park'
        type: string
  workflow_call:
    secrets:
      XAI_API_KEY:          # ← ИЗМЕНЕНО
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate image with Grok Imagine
        env:
          # HF_TOKEN больше не нужен — удаляем
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}          # ← ИЗМЕНЕНО
          # PROMPT больше не используется в скрипте (он берёт из latest_image_prompt.txt)
        run: python src/generate_image.py

      - name: List files for debug
        run: |
          ls -la data/
          if [ ! -f data/*.webp ]; then echo "Предупреждение: Нет webp в data/"; fi

      - name: Commit and push generated image
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add generated image from Grok Imagine ✨ | ${{ inputs.prompt }} | $(date)"  # ← обновлено
          file_pattern: data/*
          branch: main

      - name: Upload generated image (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: image-output
          path: data/
          retention-days: 7
